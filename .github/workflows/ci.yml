name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate sample data
        run: python ../scripts/generate_sample_data.py
        working-directory: .
      - name: Run tests
        run: pytest -q
        env:
          DATABASE_URL: sqlite:////tmp/ci_esg_platform.db

  r-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Syntax-check R files
        run: |
          for f in $(find r_dashboard -name "*.R"); do
            Rscript -e "tryCatch(parse(file='$f'), error=function(e) { cat('PARSE ERROR:', '$f', conditionMessage(e), '\n'); quit(status=1) })"
          done

  docker-build:
    runs-on: ubuntu-latest
    needs: [python-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t dachesg-api:ci .
